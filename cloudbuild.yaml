steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/boring-access/granthunter-repo/granthunter:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/boring-access/granthunter-repo/granthunter:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'granthunter-service', '--image', 'us-central1-docker.pkg.dev/boring-access/granthunter-repo/granthunter:latest', '--region', 'us-central1', '--allow-unauthenticated', '--project', 'boring-access']